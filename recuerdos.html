<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recuerdos</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(180deg,#6a0dad,#ff4da6);
color:white;
text-align:center;
}

h1{
padding:20px;
}

.galeria{

display:flex;
overflow-x:auto;
scroll-snap-type:x mandatory;

}

.foto{

flex:0 0 100%;
scroll-snap-align:center;
padding:10px;

}

.foto img{

width:90%;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.6);
transition:0.4s;

}

.foto img:active{

transform:scale(1.08);

}

.mensaje{

margin-top:12px;
font-size:18px;

}

button{

margin:20px;
padding:12px 25px;
border:none;
border-radius:25px;
background:white;
color:#6a0dad;
font-size:16px;

}

</style>

</head>

<body>

<h1>📸 Nuestros recuerdos Amor Mio</h1>

<div class="galeria">

<div class="foto">
<img src="imagenes/foto5.jpg">
<div class="mensaje">Instantes en el que mi esposita comera parrilla 😋</div>
</div>

<div class="foto">
<img src="imagenes/foto2.jpg">
<div class="mensaje">Momentos improvisos juntos corazón</div>
</div>

<div class="foto">
<img src="imagenes/foto3.jpg">
<div class="mensaje">Aventuras contigo mi reina</div>
</div>

<div class="foto">
<img src="imagenes/foto4.jpg">
<div class="mensaje">Mi terreneitor, te amo mi vida</div>
</div>

<div class="foto">
<img src="imagenes/foto1.jpg">
<div class="mensaje">Un recuerdo hermoso de nuestras aventuras❤️</div>
</div>

<div class="foto">
<img src="imagenes/foto6.jpg">
<div class="mensaje">Mujer fuerte que lo puede todo y ese dia lo demostraste amor 💜</div>
</div>

</div>

<button onclick="location.href='index.html'">
⬅ Volver
</button>

</body>

</html>
