<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Recuerdos</title>

<style>

body{
margin:0;
font-family:Segoe UI;
background:#fff0f5;
text-align:center;
}

h1{
margin-top:40px;
font-size:40px;
color:#e60073;
}

.galeria{

display:grid;

grid-template-columns:repeat(auto-fit,minmax(250px,1fr));

gap:25px;

max-width:1100px;

margin:auto;

padding:20px;

}

.foto{

background:white;

border-radius:20px;

overflow:hidden;

box-shadow:0 10px 25px rgba(0,0,0,0.2);

transition:0.4s;

}

.foto:hover{

transform:scale(1.08);

}

.foto img{

width:100%;

height:300px;

object-fit:cover;

}

.mensaje{

padding:15px;

font-size:16px;

}

.final{

margin:60px;

font-size:24px;

color:#e60073;

}

</style>

</head>

<body>

<h1>❤️ Nuestros Recuerdos ❤️</h1>

<div class="galeria">

<div class="foto">
<img src="imagenes/foto1.jpg">
<div class="mensaje">Un momento hermoso contigo.</div>
</div>

<div class="foto">
<img src="imagenes/foto2.jpg">
<div class="mensaje">Cada día contigo es especial.</div>
</div>

<div class="foto">
<img src="imagenes/foto3.jpg">
<div class="mensaje">Tu sonrisa ilumina mi vida.</div>
</div>

<div class="foto">
<img src="imagenes/foto4.jpg">
<div class="mensaje">Momentos que guardo en el corazón.</div>
</div>

<div class="foto">
<img src="imagenes/foto5.jpg">
<div class="mensaje">Gracias por cada recuerdo juntos.</div>
</div>

<div class="foto">
<img src="imagenes/foto6.jpg">
<div class="mensaje">Feliz Día de la Mujer ❤️</div>
</div>

</div>

<div class="final">

Para la mujer más maravillosa del mundo 💖  
Feliz Día de la Mujer

</div>

</body>
</html>
