<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Feliz Día de la Mujer</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Segoe UI;
background:linear-gradient(135deg,#ff6a88,#ff99ac);
color:white;
overflow:hidden;
text-align:center;
}

.caja{
background:rgba(255,255,255,0.15);
padding:50px;
border-radius:25px;
backdrop-filter:blur(12px);
max-width:600px;
}

#texto{
font-size:22px;
line-height:1.6;
min-height:120px;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:18px;
border:none;
border-radius:30px;
background:white;
color:#ff3c78;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.1);
}

.particula{
position:absolute;
font-size:20px;
animation:subir 6s linear infinite;
}

@keyframes subir{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

</style>
</head>

<body>

<audio id="musica" loop>
<source src="musica/cancion.mp3" type="audio/mpeg">
</audio>

<div class="caja">

<h1>🌹 Feliz Día de la Mujer 🌹</h1>

<div id="texto"></div>

<button onclick="iniciar()">Tengo algo especial para ti ❤️</button>

</div>

<script>

let mensaje="Hoy, en el Día de la Mujer, quiero recordarte lo maravillosa que eres. Tu fuerza, tu alegría y tu forma de ver la vida hacen que todo sea más bonito.";

let i=0;

function escribir(){

if(i<mensaje.length){
document.getElementById("texto").innerHTML+=mensaje.charAt(i);
i++;
setTimeout(escribir,40);
}

}

escribir();

function ir(){
window.location.href="carta.html";
}

function iniciar(){

let musica=document.getElementById("musica");
musica.play();

window.location.href="carta.html";

}

function particulas(){

let p=document.createElement("div");

p.className="particula";

p.innerHTML="💖";

p.style.left=Math.random()*100+"vw";

p.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(p);

setTimeout(()=>{p.remove();},6000);

}

setInterval(particulas,300);

</script>

</body>
</html>
