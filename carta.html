<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Carta del Día de la Mujer</title>

<style>

body{
margin:0;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
font-family:Georgia;
background:#fff0f5;
text-align:center;
}

.carta{

background:white;

padding:60px;

border-radius:20px;

max-width:700px;

box-shadow:0 15px 40px rgba(0,0,0,0.2);

}

h1{
color:#e60073;
}

p{
font-size:20px;
line-height:1.7;
color:#444;
}

button{

margin-top:30px;

padding:15px 40px;

font-size:18px;

border:none;

border-radius:30px;

background:#ff3c78;

color:white;

cursor:pointer;

}

</style>

</head>

<body>

<div class="carta">

<h1>💐 En este Día de la Mujer 💐</h1>

<p>

Hoy quiero celebrar el Día de la Mujer recordándote lo especial que eres.  
Eres una mujer fuerte, inteligente, valiente y llena de luz.  
Tu presencia hace que mi mundo sea mejor cada día.

</p>

<p>

Gracias por existir, por tu cariño, por tu sonrisa y por todo lo que eres.

</p>

<button onclick="ir()">Ver nuestros recuerdos 📸</button>

</div>

<script>

function ir(){
window.location.href="recuerdos.html";
}

</script>

</body>
</html>
