<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Carta para mi amor DAYANE</title>

<style>

body{
margin:0;
font-family:Arial;
background:#f7d9ff;
text-align:center;
}

.sobre{

width:300px;
height:200px;
background:#d63384;
margin:120px auto;
border-radius:10px;
cursor:pointer;
display:flex;
align-items:center;
justify-content:center;
font-size:60px;

}

.carta{

display:none;
background:white;
margin:20px;
padding:25px;
border-radius:20px;
box-shadow:0 10px 20px rgba(0,0,0,0.3);

}

h1{
color:#6a0dad;
}

p{
font-size:18px;
line-height:1.6;
color:#444;
}

button{
padding:12px 20px;
border:none;
border-radius:20px;
background:#6a0dad;
color:white;
margin-top:20px;
}

</style>

</head>

<body>

<div class="sobre" onclick="abrir()">💌</div>

<div class="carta">

<h1>Para mi vida DAYANE 🌸</h1>

<p id="texto"></p>

</div>

<button onclick="location.href='index.html'">
⬅ Volver
</button>

<script>

let mensaje = `

Hoy celebramos a las mujeres increíbles,
pero para mí la más especial eres tú.

Tu sonrisa ilumina mis días,
tu forma de ser llena mi vida de alegría
y tu presencia hace que todo sea mejor.

Gracias por existir,
gracias por ser tú.

Feliz Día de la Mujer mi Vida💜

`;

let i=0

function abrir(){

document.querySelector(".sobre").style.display="none"

document.querySelector(".carta").style.display="block"

escribir()

}

function escribir(){

if(i < mensaje.length){

document.getElementById("texto").innerHTML += mensaje.charAt(i)

i++

setTimeout(escribir,40)

}

}

</script>

</body>
</html>
